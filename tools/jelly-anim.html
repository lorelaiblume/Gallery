<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jelly Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #fff; overflow: hidden; }
  canvas { display: block; }

  #ui {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: #0e0e0e; z-index: 10;
  }
  #ui p  { font-family: Georgia, serif; font-size: 0.72rem; letter-spacing: 0.2em;
            text-transform: uppercase; color: #333; }
  #ui label {
    background: none; border: 1px solid #333; color: #888;
    padding: 10px 24px; font-family: Georgia, serif; font-size: 0.7rem;
    letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer;
    transition: all 0.15s;
  }
  #ui label:hover { border-color: #777; color: #ccc; }
  input[type=file] { display: none; }
  #ui.hidden { display: none; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui" id="ui">
  <p>Drop your shapes.svg here</p>
  <p style="color:#1e1e1e">— or —</p>
  <label>Browse file
    <input type="file" id="svg-in" accept=".svg,image/svg+xml">
  </label>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const ui     = document.getElementById('ui');

let shapes = [], svgW = 0, svgH = 0;
let sc = 1, ox = 0, oy = 0;

// ── Load SVG ──────────────────────────────────────────────────────────────────
document.getElementById('svg-in').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  f.text().then(txt => { loadSVG(txt); ui.classList.add('hidden'); requestAnimationFrame(loop); });
});

// Drag and drop onto the whole page
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if (!f) return;
  f.text().then(txt => { loadSVG(txt); ui.classList.add('hidden'); requestAnimationFrame(loop); });
});

function parsePoints(str) {
  const n = str.trim().split(/[\s,]+/).map(Number);
  const p = [];
  for (let i = 0; i + 1 < n.length; i += 2) p.push([n[i], n[i+1]]);
  return p;
}

function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

function lightenHex(h, amt) {
  const [r,g,b] = hexToRgb(h);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}

function loadSVG(txt) {
  const doc = new DOMParser().parseFromString(txt, 'image/svg+xml');
  const vb  = doc.documentElement.getAttribute('viewBox').split(' ').map(Number);
  svgW = vb[2]; svgH = vb[3];
  setupCanvas();

  shapes = Array.from(doc.querySelectorAll('polygon')).map(el => {
    const pts   = parsePoints(el.getAttribute('points'));
    const color = el.getAttribute('fill');
    return new JellyShape(pts, color);
  });
  // Random z-order
  shapes.sort(() => Math.random() - 0.5);

  // Average background color so gaps never show white
  const avg = shapes.reduce((a, s) => {
    const [r,g,b] = hexToRgb(s.color);
    return [a[0]+r, a[1]+g, a[2]+b];
  }, [0,0,0]).map(v => Math.round(v / shapes.length));
  document.body.style.background = `rgb(${avg.join(',')})`;
  canvas.style.background = `rgb(${avg.join(',')})`;
}

function setupCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  // Scale to cover (fill screen)
  sc = Math.max(canvas.width / svgW, canvas.height / svgH);
  ox = (canvas.width  - svgW * sc) / 2;
  oy = (canvas.height - svgH * sc) / 2;
}
window.addEventListener('resize', () => { if (svgW) setupCanvas(); });

// ── Laplacian polygon smoothing ───────────────────────────────────────────────
// Repeatedly averages each vertex with its neighbours — removes staircase artifacts
function laplacianSmooth(pts, iterations = 20) {
  let p = pts.slice();
  for (let iter = 0; iter < iterations; iter++) {
    const n = p.length;
    p = p.map((v, i) => {
      const a = p[(i - 1 + n) % n];
      const b = p[(i + 1)     % n];
      return [(a[0] + v[0] + b[0]) / 3,
              (a[1] + v[1] + b[1]) / 3];
    });
  }
  return p;
}

// ── Shape class ───────────────────────────────────────────────────────────────
class JellyShape {
  constructor(pts, color) {
    // Subsample then smooth to get curves as flowing as the original artwork
    const step     = Math.max(1, Math.floor(pts.length / 40));
    const sampled  = pts.filter((_, i) => i % step === 0);
    this.rest      = sampled;
    this.color     = color;
    this.rgb   = hexToRgb(color);

    // Centroid
    this.cx = pts.reduce((s,p) => s+p[0], 0) / pts.length;
    this.cy = pts.reduce((s,p) => s+p[1], 0) / pts.length;

    // Per-vertex outward normal
    this.normals = pts.map(p => {
      const dx = p[0]-this.cx, dy = p[1]-this.cy;
      const l  = Math.sqrt(dx*dx+dy*dy) || 1;
      return [dx/l, dy/l];
    });

    // Bounding box
    const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
    this.minX = Math.min(...xs); this.maxX = Math.max(...xs);
    this.minY = Math.min(...ys); this.maxY = Math.max(...ys);
    this.w = this.maxX-this.minX;
    this.h = this.maxY-this.minY;

    // Random per-shape animation parameters
    this.phase    = Math.random() * Math.PI * 2;
    this.waveAmp  = 6  + Math.random() * 7;   // SVG units, edge ripple height
    this.waveLen  = 0.22 + Math.random() * 0.18; // spatial frequency along edge
    this.waveSpd  = 0.7  + Math.random() * 0.5;  // wave travel speed
    this.bobAmp   = 4  + Math.random() * 6;   // SVG units, vertical bob
    this.bobFreq  = 0.35 + Math.random() * 0.25;
    this.gap      = 0;  // inflation handles seam-closing now
  }

  // Returns animated vertex positions at time t
  animPts(t) {
    const bob     = Math.sin(t * this.bobFreq + this.phase) * this.bobAmp;
    const squishT = Math.sin(t * this.bobFreq + this.phase);
    const sx      = 1 + squishT * 0.018;  // squish x
    const sy      = 1 - squishT * 0.012;  // squish y (inverse)

    return this.rest.map((p, i) => {
      // Traveling wave along the edge perimeter
      const wave   = Math.sin(t * this.waveSpd + i * this.waveLen + this.phase);
      const offset = wave * this.waveAmp + this.gap;
      const [nx,ny] = this.normals[i];

      // Apply squish + 10% inflation relative to centroid, then bob
      const dx = (p[0] + nx * offset - this.cx) * sx * 1.25;
      const dy = (p[1] + ny * offset - this.cy) * sy * 1.25;
      return [this.cx + dx, this.cy + dy + bob];
    });
  }
}

// ── Drawing ───────────────────────────────────────────────────────────────────
// Catmull-Rom smooth path through points (closed)
function smoothPath(pts) {
  const n = pts.length;
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const p0 = pts[(i-1+n)%n], p1 = pts[i];
    const p2 = pts[(i+1)%n],   p3 = pts[(i+2)%n];
    const cp1x = p1[0] + (p2[0]-p0[0])/4;
    const cp1y = p1[1] + (p2[1]-p0[1])/4;
    const cp2x = p2[0] - (p3[0]-p1[0])/4;
    const cp2y = p2[1] - (p3[1]-p1[1])/4;
    if (i === 0) ctx.moveTo(p1[0], p1[1]);
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2[0], p2[1]);
  }
  ctx.closePath();
}

function drawJelly(shape, pts) {
  const { cx, cy, minY, h, w, waveAmp, color, rgb } = shape;
  const pad = waveAmp + 20;

  // ── Drop shadow pass (before clip, so shadow renders outside shape) ──────────
  smoothPath(pts);
  ctx.save();
  ctx.shadowColor   = 'rgba(0,0,0,0.38)';
  ctx.shadowBlur    = 28;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 18;
  ctx.fillStyle     = color;
  ctx.fill();
  ctx.restore();

  // ── 1. Base fill clipped to animated shape ──────────────────────────────────
  smoothPath(pts);
  ctx.save();
  ctx.clip();

  // Solid base color
  ctx.fillStyle = color;
  ctx.fillRect(shape.minX-pad, shape.minY-pad, w+pad*2, h+pad*2);

  // Puffy dome gradient: white at top → transparent at bottom
  const domeY  = minY + h * 0.15;
  const dome   = ctx.createRadialGradient(cx, domeY, 0, cx, cy, h * 0.75);
  dome.addColorStop(0,    'rgba(255,255,255,0.52)');
  dome.addColorStop(0.35, 'rgba(255,255,255,0.15)');
  dome.addColorStop(0.7,  'rgba(0,0,0,0)');
  dome.addColorStop(1,    'rgba(0,0,0,0.2)');
  ctx.fillStyle = dome;
  ctx.fillRect(shape.minX-pad, shape.minY-pad, w+pad*2, h+pad*2);

  // Edge darkening (inner shadow at perimeter)
  const edgeGrad = ctx.createRadialGradient(cx, cy, Math.min(w,h)*0.3, cx, cy, Math.max(w,h)*0.8);
  edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
  edgeGrad.addColorStop(1, 'rgba(0,0,0,0.14)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(shape.minX-pad, shape.minY-pad, w+pad*2, h+pad*2);

  // Specular highlight — small bright oval at top-center
  const specX  = cx;
  const specY  = minY + h * 0.18;
  const specRx = w  * 0.18;
  const specRy = h  * 0.10;
  const spec   = ctx.createRadialGradient(specX, specY, 0, specX, specY, Math.max(specRx, specRy));
  spec.addColorStop(0,   'rgba(255,255,255,0.88)');
  spec.addColorStop(0.45,'rgba(255,255,255,0.28)');
  spec.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.save();
  ctx.scale(specRx / Math.max(specRx, specRy), specRy / Math.max(specRx, specRy));
  const scaleInv = Math.max(specRx, specRy);
  ctx.fillStyle = spec;
  ctx.fillRect(
    (shape.minX-pad) / (specRx/scaleInv),
    (shape.minY-pad) / (specRy/scaleInv),
    (w+pad*2)        / (specRx/scaleInv),
    (h+pad*2)        / (specRy/scaleInv)
  );
  ctx.restore();

  ctx.restore(); // end clip
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let t0 = null;
function loop(ts) {
  if (!t0) t0 = ts;
  const t = (ts - t0) / 1000;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(sc, sc);

  for (const shape of shapes) {
    drawJelly(shape, shape.animPts(t));
  }

  ctx.restore();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
