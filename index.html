<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorelai Blume</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>LORELAI BLUME</h1>
    <p class="subheading">Art Portfolio</p>
    <nav>
      <button class="nav-btn active" data-category="digital">Digital Art</button>
      <button class="nav-btn" data-category="watercolor">Watercolor</button>
      <button class="nav-btn" data-category="drawings">Drawings</button>
    </nav>
  </header>

  <main>
    <div class="upload-area hidden" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*,.pdf" multiple hidden />
      <p>Drop images or PDFs here</p>
      <button id="browseBtn">Browse Files</button>
      <button id="bulkImportBtn">Bulk Import from This Browser</button>
    </div>

    <div class="gallery" id="gallery">
      <div class="loading" id="loadingMsg">Loading...</div>
    </div>
  </main>

  <div class="toolbar" id="toolbar">
    <a class="toolbar-btn" id="editLink" href="?edit" title="Add art">✎</a>
    <button class="toolbar-btn" id="qrBtn" title="Share on phone">⬡</button>
  </div>

  <div class="modal-overlay hidden" id="qrModal">
    <div class="modal qr-only">
      <div id="qrCode"></div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
