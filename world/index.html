<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Builder — Lorelai Blume</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #0a0d14; color: #eef1f6;
                 font-family: -apple-system, Segoe UI, Karla, sans-serif; overflow: hidden; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }
    #loading { position: fixed; inset: 0; display: grid; place-items: center; z-index: 20;
               font-size: 14px; color: #9fb4d8; }
    .caption { position: fixed; left: 50%; top: 16px; transform: translateX(-50%);
      z-index: 10; color: #9fb4d8; font-size: 12px; letter-spacing: .03em; text-align:center; }
    .home { position: fixed; left: 16px; bottom: 14px; z-index: 20;
      color: #7c8296; text-decoration: none; font-size: 0.72rem;
      letter-spacing: 0.18em; text-transform: uppercase; transition: color .2s; }
    .home:hover { color: #7cd66b; }
    #panel {
      position: fixed; top: 16px; left: 16px; width: 226px; padding: 15px 17px;
      background: rgba(16,21,31,0.86); backdrop-filter: blur(8px);
      border: 1px solid #2a3242; border-radius: 14px; z-index: 10; user-select: none;
    }
    #panel h1 { font-size: 15px; margin: 0 0 2px; }
    #panel .sub { font-size: 11px; color: #8b96ac; margin: 0 0 12px; }
    .grp { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #6b7890; margin: 14px 0 7px; }
    .tools { display:flex; flex-wrap:wrap; gap:6px; }
    .tool { flex:1 1 44%; padding:8px 4px; font-size:12px; cursor:pointer; text-align:center;
            background:#161d29; color:#9fb0c6; border:1px solid #2a3242; border-radius:9px; }
    .tool.active { color:#7cd66b; border-color:#7cd66b; background:rgba(124,214,107,0.1); }
    .row { margin: 10px 0 4px; font-size: 12px; }
    .row label { display:flex; justify-content:space-between; color:#b9c4d8; margin-bottom:4px; }
    .row label span { color:#7cd66b; font-variant-numeric: tabular-nums; }
    .row input[type=range] { width:100%; accent-color:#7cd66b; }
    .btn { display:block; width:100%; margin-top:12px; padding:8px; font-size:12px; cursor:pointer;
           background:#1c2432; color:#b9c4d8; border:1px solid #2f3a4d; border-radius:8px; }
    .btn:hover { border-color:#e06a6a; color:#e06a6a; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="loading">Shaping the island…</div>
  <div class="caption">left‑drag to sculpt · right‑drag to orbit · scroll to zoom</div>
  <a class="home" href="/">← Lorelai Blume</a>

  <div id="panel">
    <h1>🏔️ World Builder</h1>
    <p class="sub">Sculpt hills, paint paths.</p>

    <div class="grp">Tool</div>
    <div class="tools">
      <div class="tool active" data-tool="raise">⛰️ Raise</div>
      <div class="tool" data-tool="lower">🕳️ Lower</div>
      <div class="tool" data-tool="path">🛣️ Path</div>
      <div class="tool" data-tool="fill">💧 Water</div>
    </div>

    <div class="grp">Brush</div>
    <div class="row"><label>Size <span id="vSize">14</span></label>
      <input id="bSize" type="range" min="4" max="34" step="1" value="14" /></div>
    <div class="row"><label>Strength <span id="vStr">0.6</span></label>
      <input id="bStr" type="range" min="0.1" max="1.5" step="0.05" value="0.6" /></div>

    <p class="sub" style="margin-top:10px">💧 Water fills the basin you click, up to its lowest rim.</p>

    <button class="btn" id="reset">Reset the island</button>
  </div>

  <script type="importmap">
  { "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  } }
  </script>
  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  const $ = id => document.getElementById(id);

  // ── renderer / scene ──
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('app').appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0d14);

  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 1200);
  camera.position.set(0, 130, 170);
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);
  controls.maxPolarAngle = Math.PI*0.49;
  controls.minDistance = 40; controls.maxDistance = 380;
  controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };

  scene.add(new THREE.HemisphereLight(0xcfe6ff, 0x33402a, 0.95));
  const sun = new THREE.DirectionalLight(0xfff4e0, 1.2);
  sun.position.set(80, 140, 60); sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.near = 20; sun.shadow.camera.far = 400;
  sun.shadow.camera.left=-140; sun.shadow.camera.right=140; sun.shadow.camera.top=140; sun.shadow.camera.bottom=-140;
  sun.shadow.bias = -0.0006; scene.add(sun);

  // ── build the circular island grid ──
  const R = 130, G = 150;                 // radius, grid resolution
  const step = (2*R)/G;
  const idxMap = new Int32Array((G+1)*(G+1)).fill(-1);
  const px = [], pz = [], gi = [], gj = [];
  for (let j=0;j<=G;j++) for (let i=0;i<=G;i++){
    const x = -R + i*step, z = -R + j*step;
    if (x*x + z*z <= R*R){ idxMap[j*(G+1)+i] = px.length; px.push(x); pz.push(z); gi.push(i); gj.push(j); }
  }
  const nV = px.length;
  const positions = new Float32Array(nV*3);
  for (let v=0; v<nV; v++){ positions[v*3]=px[v]; positions[v*3+1]=0; positions[v*3+2]=pz[v]; }
  const indices = [];
  for (let j=0;j<G;j++) for (let i=0;i<G;i++){
    const a=idxMap[j*(G+1)+i], b=idxMap[j*(G+1)+i+1], c=idxMap[(j+1)*(G+1)+i], d=idxMap[(j+1)*(G+1)+i+1];
    if (a<0||b<0||c<0||d<0) continue;
    indices.push(a,c,b, b,c,d);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setIndex(indices);
  const colAttr = new THREE.BufferAttribute(new Float32Array(nV*3), 3);
  geo.setAttribute('color', colAttr);
  geo.computeVertexNormals();

  const isPath = new Uint8Array(nV);
  const C_LOW  = new THREE.Color(0x4f8f3c);
  const C_HIGH = new THREE.Color(0x8fce63);
  const C_PATH = new THREE.Color(0x726b5e);
  const tc = new THREE.Color();
  function setColor(v){
    const y = positions[v*3+1];
    if (isPath[v]) tc.copy(C_PATH);
    else tc.copy(C_LOW).lerp(C_HIGH, Math.min(1, Math.max(0, y/16)));
    colAttr.array[v*3]=tc.r; colAttr.array[v*3+1]=tc.g; colAttr.array[v*3+2]=tc.b;
  }
  for (let v=0; v<nV; v++) setColor(v);
  colAttr.needsUpdate = true;

  const ground = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    vertexColors: true, flatShading: true, roughness: 1, metalness: 0 }));
  ground.castShadow = true; ground.receiveShadow = true; scene.add(ground);

  // island rim + underside so it reads as a floating disc
  const rimMat = new THREE.MeshStandardMaterial({ color: 0x6b5535, roughness: 1, flatShading: true });
  const rim = new THREE.Mesh(new THREE.CylinderGeometry(R, R*0.82, 10, 96, 1, true), rimMat);
  rim.position.y = -5; scene.add(rim);
  const underside = new THREE.Mesh(new THREE.CircleGeometry(R*0.82, 96), rimMat);
  underside.rotation.x = Math.PI/2; underside.position.y = -10; scene.add(underside);

  // ── water: flood-fill individual basins ──
  const waterY = new Float32Array(nV).fill(-Infinity);
  function nbrs(v){
    const i=gi[v], j=gj[v], out=[];
    const g=(ii,jj)=> (ii<0||jj<0||ii>G||jj>G) ? -1 : idxMap[jj*(G+1)+ii];
    for (const [di,dj] of [[1,0],[-1,0],[0,1],[0,-1]]){ const id=g(i+di,j+dj); if(id>=0) out.push(id); }
    return out;
  }
  const isEdge = new Uint8Array(nV);
  for (let v=0; v<nV; v++) if (nbrs(v).length < 4) isEdge[v]=1;   // touches the island rim

  const waterMat = new THREE.MeshStandardMaterial({ color:0x3f86c4, transparent:true, opacity:0.76,
    roughness:0.14, metalness:0.1, depthWrite:false, side:THREE.DoubleSide });
  const waterMesh = new THREE.Mesh(new THREE.BufferGeometry(), waterMat);
  waterMesh.renderOrder = 1; scene.add(waterMesh);
  function rebuildWater(){
    const arr=[];
    for (let j=0;j<G;j++) for (let i=0;i<G;i++){
      const a=idxMap[j*(G+1)+i], b=idxMap[j*(G+1)+i+1], c=idxMap[(j+1)*(G+1)+i], d=idxMap[(j+1)*(G+1)+i+1];
      if (a<0||b<0||c<0||d<0) continue;
      if (waterY[a]===-Infinity||waterY[b]===-Infinity||waterY[c]===-Infinity||waterY[d]===-Infinity) continue;
      arr.push(px[a],waterY[a],pz[a], px[c],waterY[c],pz[c], px[b],waterY[b],pz[b]);
      arr.push(px[b],waterY[b],pz[b], px[c],waterY[c],pz[c], px[d],waterY[d],pz[d]);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(arr),3));
    g.computeVertexNormals();
    waterMesh.geometry.dispose(); waterMesh.geometry = g;
  }

  // min-heap (by terrain height) for the watershed flood
  const hh=[], hv=[];
  function hpush(h,v){ hh.push(h); hv.push(v); let c=hh.length-1;
    while(c>0){ const p=(c-1)>>1; if(hh[p]<=hh[c]) break;
      [hh[p],hh[c]]=[hh[c],hh[p]]; [hv[p],hv[c]]=[hv[c],hv[p]]; c=p; } }
  function hpop(){ const h0=hh[0], v0=hv[0], lh=hh.pop(), lv=hv.pop();
    if(hh.length){ hh[0]=lh; hv[0]=lv; let c=0, n=hh.length;
      for(;;){ let l=2*c+1, r=2*c+2, s=c; if(l<n&&hh[l]<hh[s])s=l; if(r<n&&hh[r]<hh[s])s=r; if(s===c)break;
        [hh[s],hh[c]]=[hh[c],hh[s]]; [hv[s],hv[c]]=[hv[c],hv[s]]; c=s; } }
    return [h0,v0]; }
  const visited = new Uint8Array(nV);
  function floodFill(seed){
    visited.fill(0); hh.length=0; hv.length=0;
    hpush(positions[seed*3+1], seed); visited[seed]=1;
    let spill = Infinity; const basin=[];
    while(hh.length){
      const [h,v]=hpop();
      if (isEdge[v]){ spill=h; break; }     // water would drain off the island here
      basin.push(v);
      for (const nb of nbrs(v)) if(!visited[nb]){ visited[nb]=1; hpush(positions[nb*3+1], nb); }
    }
    if (!isFinite(spill)) return;
    let filled=false;
    for (const v of basin) if (positions[v*3+1] < spill - 0.02){ waterY[v]=spill; filled=true; }
    if (filled) rebuildWater();
  }
  let waterDirty = false;

  // ── brush cursor ring ──
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.92, 1, 48),
    new THREE.MeshBasicMaterial({ color: 0x7cd66b, transparent:true, opacity:0.9, side:THREE.DoubleSide }));
  ring.rotation.x = -Math.PI/2; ring.visible = false; scene.add(ring);

  // ── sculpting ──
  let tool = 'raise', brush = 14, strength = 0.6;
  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();

  function pick(e){
    ndc.x = (e.clientX/innerWidth)*2 - 1;
    ndc.y = -(e.clientY/innerHeight)*2 + 1;
    raycaster.setFromCamera(ndc, camera);
    return raycaster.intersectObject(ground, false)[0];
  }

  function apply(cx, cz){
    const r2 = brush*brush;
    for (let v=0; v<nV; v++){
      const dx = px[v]-cx, dz = pz[v]-cz;
      const d2 = dx*dx + dz*dz;
      if (d2 > r2) continue;
      const fall = 1 - Math.sqrt(d2)/brush;
      const f = fall*fall*(3-2*fall);
      let y = positions[v*3+1];
      if (tool === 'raise'){ y += strength*f; isPath[v]=0; }
      else if (tool === 'lower'){ y -= strength*f; isPath[v]=0; }
      else { y += (0 - y)*Math.min(1, strength*f*0.6); isPath[v]=1; }   // path: flatten + mark
      positions[v*3+1] = y;
      if (waterY[v] !== -Infinity){ waterY[v] = -Infinity; waterDirty = true; }   // reshaping drains water
      setColor(v);
    }
    geo.attributes.position.needsUpdate = true;
    colAttr.needsUpdate = true;
    geo.computeBoundingSphere();
  }

  function vertexAt(point){
    const i = Math.round((point.x + R)/step), j = Math.round((point.z + R)/step);
    if (i<0||i>G||j<0||j>G) return -1;
    return idxMap[j*(G+1)+i];
  }

  let painting = false;
  renderer.domElement.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    const hit = pick(e); if (!hit) return;
    if (tool === 'fill'){ const s = vertexAt(hit.point); if (s>=0) floodFill(s); return; }
    painting = true; apply(hit.point.x, hit.point.z);
  });
  renderer.domElement.addEventListener('pointermove', e => {
    const hit = pick(e);
    if (hit){ ring.visible = true; ring.position.set(hit.point.x, hit.point.y+0.3, hit.point.z); ring.scale.setScalar(brush); }
    else ring.visible = false;
    if (painting && (e.buttons & 1) && hit) apply(hit.point.x, hit.point.z);
  });
  addEventListener('pointerup', () => { painting = false; if (waterDirty){ rebuildWater(); waterDirty = false; } });
  renderer.domElement.addEventListener('pointerleave', () => { ring.visible = false; });

  // ── panel wiring ──
  document.querySelectorAll('.tool').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tool').forEach(x => x.classList.remove('active'));
    t.classList.add('active'); tool = t.dataset.tool;
  });
  $('bSize').addEventListener('input', e => { brush = +e.target.value; $('vSize').textContent = e.target.value; });
  $('bStr').addEventListener('input',  e => { strength = +e.target.value; $('vStr').textContent = (+e.target.value).toFixed(2); });
  $('reset').onclick = () => {
    for (let v=0; v<nV; v++){ positions[v*3+1]=0; isPath[v]=0; waterY[v]=-Infinity; setColor(v); }
    geo.attributes.position.needsUpdate = true; colAttr.needsUpdate = true; geo.computeBoundingSphere();
    rebuildWater();
  };

  document.getElementById('loading').style.display = 'none';
  function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
  animate();
  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  </script>
</body>
</html>
